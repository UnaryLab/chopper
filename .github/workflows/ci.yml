name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  install:
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-22.04:7.2
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y rocprofiler-sdk
      - run: pip install --upgrade pip
      - run: pip install -e .
