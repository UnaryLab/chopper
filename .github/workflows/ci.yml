name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-22.04:7.2
    steps:
      - uses: actions/checkout@v4
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check chopper/
      - run: apt-get install -y libgl1 libegl1 2>&1 | tail -1
      - run: pdoc chopper -o docs
      - run: cp chopper.jpg docs/chopper/chopper.jpg
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
